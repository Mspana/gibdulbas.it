<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#181420;font-family:"Courier New",monospace;user-select:none}
  #gl{position:fixed;inset:0;touch-action:none}
  #hud{position:fixed;top:10px;left:0;right:0;text-align:center;color:#f8f4e8;font-size:12px;letter-spacing:2px;text-transform:uppercase;text-shadow:0 2px 4px rgba(0,0,0,.5);pointer-events:none}
  #hud b{color:#f7b32b}
  #hud .part{opacity:.32;font-size:10px;letter-spacing:2px}
  #hud .part.got{opacity:1;color:#f7b32b;text-shadow:0 0 8px rgba(247,179,43,.6)}
  #hud .dot{opacity:.32;font-size:10px;margin:0 4px}
  #hint{position:fixed;bottom:10px;left:0;right:0;text-align:center;color:rgba(248,244,232,.7);font-size:10px;letter-spacing:1px;pointer-events:none}
  #dialog{position:fixed;left:50%;bottom:110px;transform:translateX(-50%);width:min(520px,92vw);background:#f8f4e8;border:3px solid #2a2438;outline:1px solid #8a83a0;outline-offset:-8px;border-radius:4px;padding:16px 20px;font-weight:bold;font-size:14px;line-height:1.5;color:#2a2438;display:none;box-shadow:0 10px 30px rgba(0,0,0,.45)}
  #dialog .arrow{position:absolute;right:16px;bottom:8px;animation:blink .8s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  #pad{position:fixed;bottom:14px;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-end;padding:0 22px;pointer-events:none}
  .dpad{display:grid;grid-template-columns:repeat(3,54px);grid-template-rows:repeat(3,54px);pointer-events:auto}
  .dbtn{background:rgba(58,51,80,.85);border:2px solid #565073;border-radius:10px;color:#f8f4e8;font-size:20px;display:flex;align-items:center;justify-content:center}
  .dbtn:active{background:#565073}
  .dbtn.blank{visibility:hidden}
  #abtn{width:72px;height:72px;border-radius:50%;background:#c9372c;border:3px solid #e0705f;color:#f8f4e8;font-size:24px;font-weight:bold;display:flex;align-items:center;justify-content:center;pointer-events:auto;box-shadow:0 4px 0 #6e2f24}
  #abtn:active{transform:translateY(3px);box-shadow:0 1px 0 #6e2f24}
  @media (min-width:900px) and (hover:hover){ #pad{display:none} }
  /* ---------- battle ---------- */
  #battleWrap{position:fixed;inset:0;background:#181420;display:none;align-items:center;justify-content:center;z-index:5}
  #battle{image-rendering:pixelated;image-rendering:crisp-edges;width:min(100vw,133.33vh);aspect-ratio:4/3;touch-action:none}
  /* ---------- title screen ---------- */
  #title{position:fixed;inset:0;z-index:10;background:radial-gradient(ellipse at 50% 32%,#2e2745 0%,#12101c 72%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .7s}
  #title.off{opacity:0;pointer-events:none}
  #titleImg{width:min(44vw,240px);image-rendering:pixelated;image-rendering:crisp-edges;filter:drop-shadow(0 10px 24px rgba(0,0,0,.6));animation:titlefloat 3s ease-in-out infinite}
  @keyframes titlefloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  #title h1{color:#f7b32b;font-size:min(11vw,58px);letter-spacing:6px;text-shadow:0 0 26px rgba(247,179,43,.5),4px 4px 0 #6e2f24;font-weight:bold}
  #titlePress{color:#c9c3da;font-size:13px;letter-spacing:3px;animation:blink 1.2s steps(1) infinite}
  #titleCredit{position:absolute;bottom:16px;left:0;right:0;text-align:center;color:#6f6a82;font-size:10px;letter-spacing:2px}
  /* ---------- intro cutscene ---------- */
  #intro{position:fixed;inset:0;z-index:9;background:radial-gradient(ellipse at 50% 30%,#2e2745 0%,#181420 70%);transition:opacity .5s}
  #intro.fadeout{opacity:0;pointer-events:none}
  .port{position:absolute;bottom:150px;width:min(38vw,250px);image-rendering:pixelated;image-rendering:crisp-edges;transition:transform .35s ease,filter .35s ease}
  #portH{left:5vw}
  #portV{right:5vw}
  .port.inactive{filter:brightness(.5) saturate(.35);transform:translateY(22px)}
  .port.active{filter:none;transform:translateY(0)}
  .port.hit{animation:vshake .55s;filter:saturate(2.4) sepia(.5) hue-rotate(-25deg) brightness(1.15)}
  @keyframes vshake{0%,100%{transform:translate(0,0)}15%{transform:translate(-10px,2px)}35%{transform:translate(9px,-2px)}55%{transform:translate(-7px,1px)}75%{transform:translate(6px,0)}}
  .port.sunk{transition:transform 1.3s ease-in,opacity 1.3s ease-in;transform:translateY(75vh) rotate(9deg);opacity:0}
  #introBox{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);width:min(560px,94vw);background:#f8f4e8;border:3px solid #2a2438;outline:1px solid #8a83a0;outline-offset:-8px;border-radius:4px;padding:14px 20px 18px;color:#2a2438;box-shadow:0 10px 30px rgba(0,0,0,.5)}
  #introName{display:inline-block;background:#2a2438;color:#f8f4e8;font-weight:bold;font-size:11px;letter-spacing:2px;padding:3px 10px;border-radius:3px;margin-bottom:8px}
  #introText{font-weight:bold;font-size:15px;line-height:1.5;min-height:44px;white-space:pre-line}
  #introBox .arrow{position:absolute;right:16px;bottom:8px;animation:blink .8s steps(1) infinite}
  #introSkip{position:absolute;top:12px;right:14px;background:rgba(58,51,80,.85);color:#f8f4e8;border:2px solid #565073;border-radius:8px;font-family:inherit;font-weight:bold;font-size:11px;letter-spacing:1px;padding:6px 12px;cursor:pointer}
  /* ---------- ghost of velli ---------- */
  #ghost{position:fixed;inset:0;z-index:7;display:none;background:rgba(14,12,24,.6)}
  #ghost.on{display:block}
  #ghostImg{position:absolute;left:50%;top:14%;width:min(34vw,200px);image-rendering:pixelated;image-rendering:crisp-edges;filter:sepia(1) hue-rotate(165deg) saturate(2.1) brightness(1.2) opacity(.82) drop-shadow(0 0 22px rgba(130,200,255,.55));animation:ghostfloat 2.6s ease-in-out infinite}
  @keyframes ghostfloat{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,-16px)}}
  #ghostBox{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);width:min(560px,94vw);background:#f8f4e8;border:3px solid #6ea8d8;outline:1px solid #8a83a0;outline-offset:-8px;border-radius:4px;padding:14px 20px 18px;color:#2a2438;box-shadow:0 0 30px rgba(110,168,216,.35)}
  #ghostBox .gname{display:inline-block;background:#2e5d8a;color:#dff0ff;font-weight:bold;font-size:11px;letter-spacing:2px;padding:3px 10px;border-radius:3px;margin-bottom:8px}
  #ghostBox .gtext{font-weight:bold;font-size:14px;line-height:1.5;font-style:italic}
  #ghostBox .arrow{position:absolute;right:16px;bottom:8px;animation:blink .8s steps(1) infinite}
  /* ---------- ending ---------- */
  #ending{position:fixed;inset:0;z-index:8;background:linear-gradient(#43307a,#1a1433 55%,#0e0c18);opacity:0;visibility:hidden;pointer-events:none;transition:opacity 1.6s ease,visibility 0s linear 1.6s}
  #ending.on{opacity:1;visibility:visible;pointer-events:auto;transition:opacity 1.6s ease}
  #heaven{position:absolute;inset:0;opacity:0;transition:opacity 2s;background:
    radial-gradient(ellipse 70% 34% at 50% 6%, rgba(255,238,180,.95), rgba(255,220,140,.35) 55%, transparent 75%),
    radial-gradient(ellipse 42% 15% at 28% 20%, rgba(255,255,255,.5), transparent 70%),
    radial-gradient(ellipse 46% 16% at 72% 16%, rgba(255,255,255,.45), transparent 70%),
    linear-gradient(#3a3560 0%, #1a1730 55%, #0e0c18 100%)}
  #ending.heaven #heaven{opacity:1}
  #josiahWrap{position:absolute;left:38%;top:6%;transform:translate(-50%,-24px);opacity:0;transition:opacity 1.8s ease,transform 1.8s ease}
  #ending.heaven #josiahWrap{opacity:1;transform:translate(-50%,0)}
  #josiahWrap .halo{position:absolute;left:50%;top:-14px;transform:translateX(-50%);width:56%;height:16px;border:4px solid #ffd977;border-radius:50%;box-shadow:0 0 16px rgba(255,217,119,.9)}
  #endJosiah{width:min(30vw,180px);image-rendering:pixelated;image-rendering:crisp-edges;filter:saturate(1.2) brightness(1.12) drop-shadow(0 0 26px rgba(255,220,120,.75))}
  #endVelli{position:absolute;left:50%;top:32%;width:min(32vw,195px);image-rendering:pixelated;image-rendering:crisp-edges;transform:translateX(-50%);filter:sepia(1) hue-rotate(165deg) saturate(2.1) brightness(1.2) opacity(.85) drop-shadow(0 0 22px rgba(130,200,255,.55));transition:left 2.4s ease-in-out,top 2.4s ease-in-out,width 2.4s ease-in-out;animation:ghostfloat 2.6s ease-in-out infinite}
  #ending.heaven #endVelli{left:62%;top:8%;width:min(26vw,160px)}
  #endBox{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);width:min(560px,94vw);background:#f8f4e8;border:3px solid #6ea8d8;outline:1px solid #8a83a0;outline-offset:-8px;border-radius:4px;padding:14px 20px 18px;color:#2a2438;box-shadow:0 0 30px rgba(110,168,216,.35)}

const introEl = document.getElementById('intro');
const portH = document.getElementById('portH');
const portV = document.getElementById('portV');
const introName = document.getElementById('introName');
const introText = document.getElementById('introText');
portH.src = 'data:image/png;base64,' + PORTRAIT_B64.harrison;
portV.src = 'data:image/png;base64,' + PORTRAIT_B64.velli;

const INTRO_SCRIPT = [
  { who:'v', text:'harrison' },
  { who:'v', text:'the one texted quarterly' },
  { who:'v', text:'only you can unite the head, neck, chin, and lips' },
  { who:'v', text:'\u2026' },
  { who:'v', text:'oooooh nani nani' },
  { who:'v', text:'harrison head shaped like a quaalude' },
  { who:'h', text:'[ HARRISON attacks ]', action:'attack' },
  { who:'v', text:'inshallah\u2026' },
  { who:'v', action:'sink' }
];
let introActive = false, introIdx = -1, introBusy = false;

function setSpeaker(who){
  portH.classList.toggle('active',   who === 'h');
  portH.classList.toggle('inactive', who !== 'h');
  portV.classList.toggle('active',   who === 'v');
  portV.classList.toggle('inactive', who !== 'v');
  introName.textContent = who === 'h' ? 'HARRISON' : 'VELLI';
}
function introNext(){
  if (!introActive || introBusy) return;
  introIdx++;
  const step = INTRO_SCRIPT[introIdx];
  if (!step){ endIntro(); return; }
  setSpeaker(step.who);
  if (step.action === 'attack'){
    introText.textContent = step.text;
    portV.classList.remove('active');
    portV.classList.add('inactive', 'hit');
    introBusy = true;
    setTimeout(() => { portV.classList.remove('hit'); introBusy = false; }, 600);
    return;
  }
  if (step.action === 'sink'){
    introBusy = true;
    document.getElementById('introBox').style.visibility = 'hidden';
    portV.classList.remove('inactive');
    portV.classList.add('active');          // one last moment in the light
    requestAnimationFrame(() => portV.classList.add('sunk'));
    setTimeout(endIntro, 1500);
    return;
  }
  introText.textContent = step.text;
}
function endIntro(){
  if (!introActive) return;
  introActive = false;
  introEl.classList.add('fadeout');
  setTimeout(() => {
    introEl.style.display = 'none';
    showGhostMessage('four people are blocking the way down. battle each one to get to the end.');
  }, 600);
}
introEl.addEventListener('pointerdown', e => { e.preventDefault(); introNext(); });
document.getElementById('introSkip').addEventListener('pointerdown', e => {
  e.stopPropagation(); e.preventDefault(); endIntro();
});

const titleEl = document.getElementById('title');
document.getElementById('titleImg').src = 'data:image/png;base64,' + PORTRAIT_B64.harrison;
let titleActive = true, titleMode = 'start';
function beginIntro(){
  introActive = true; introIdx = -1; introBusy = false;
  introNext();
}
function showTitle(mode){
  titleMode = mode;
  titleActive = true;
  titleEl.style.display = 'flex';
  titleEl.classList.remove('off');
}
function titleDismiss(){
  if (!titleActive) return;
  titleActive = false;
  titleEl.classList.add('off');
  setTimeout(() => { titleEl.style.display = 'none'; }, 750);
  if (titleMode === 'start') beginIntro();
  else resetGame();
}
function resetGame(){
  trainers.forEach(t => {
    t.defeated = false;
    t.tx = t.home[0]; t.tz = t.home[1];
    if (t.group) t.group.position.set(t.tx + 0.5, 0, t.tz + 0.5);
  });
  gotParts.fill(false);
  updateHudParts();
  pendingBattle = null;
  endingSeen = false;
  player.tx = 10; player.tz = 4; player.x = 10.5; player.z = 4.5;
  player.dir = 'down'; player.moving = false;
  camTarget.set(player.x, 0.6, player.z);
  // replay the velli intro
  introEl.style.display = '';
  introEl.classList.remove('fadeout');
  document.getElementById('introBox').style.visibility = 'visible';
  portV.classList.remove('sunk', 'hit');
  beginIntro();
}
titleEl.addEventListener('pointerdown', e => { e.preventDefault(); titleDismiss(); });

/* =====================================================================
   THE 2.5D SETUP (parity with the article's Attempt 1)
   - Real 3D scene, PerspectiveCamera (real perspective projection)
   - Camera pitched down at EXACTLY 45 degrees
   - Player is a 2D sprite on a plane fixed at 45° in world space.
     It is NOT billboarded: it never rotates to face the camera, so as
     you walk to the edges of the view you can see it is a tilted quad.
   - Buildings are true 3D boxes: walk side to side and their visible
     faces change with perspective.
   ===================================================================== */

const TILT = Math.PI / 4;          // 45°, used for both camera and sprite planes
const MAPW = 22, MAPH = 32;

   . sidewalk  = asphalt  X crosswalk  s steam grate  b barricade

   t tree  h hydrant  T taxi  W newsstand
   Four cross streets, each blocked by barricades with a single gap
   where a rival stands. Alleys through the building bands are
   staggered so the gauntlet zigzags.                             */

function facadeTexture(wTiles, hUnits, specials, palette){
  const PXU = 16; // px per world unit
  const c = makeCanvas(wTiles*PXU, Math.round(hUnits*PXU)), g = c.getContext('2d');
  const W = c.width, H = c.height;
  P(g,0,0,W,H,palette.brick);
  // brick courses
  g.strokeStyle = palette.dark; g.lineWidth = 1;
  for (let y=4; y<H; y+=4){ g.beginPath(); g.moveTo(0,y+.5); g.lineTo(W,y+.5); g.stroke(); }
  // cornice
  P(g,0,0,W,3,palette.dark); P(g,0,3,W,1,'#d8cf9e');
  // windows on upper floors (leave bottom 20px for street level)
  for (let fy=8; fy<H-24; fy+=14){
    for (let tx=0; tx<wTiles; tx++){
      P(g, tx*PXU+3, fy, 9, 9, '#2e3d55');
      P(g, tx*PXU+4, fy+1, 3, 4, '#8fb0d8');
      P(g, tx*PXU+2, fy+9, 11, 2, '#d8cf9e');
    }
  }
  // street level per tile
  for (let tx=0; tx<wTiles; tx++){
    const sp = specials[tx], X = tx*PXU, Y = H-20;
    if (sp==='D'){
      P(g,X+3,Y+2,10,18,'#4a3324'); P(g,X+4,Y+4,8,16,'#5f452f');
      P(g,X+5,Y+6,6,5,'#2e3d55'); P(g,X+10,Y+12,1,3,'#d8cf9e');
    } else if (sp==='P'){
      P(g,X-2,Y-2,PXU+4,7,'#c9372c');
      for(let i=0;i<4;i++) P(g,X-2+i*5,Y-2,3,7,'#f0ede2');
      P(g,X-2,Y+5,PXU+4,1,'#7e2018');
      P(g,X+3,Y+7,10,13,'#3a2a1c'); P(g,X+4,Y+9,8,10,'#f2b23a');
      P(g,X+1,Y-9,14,6,'#1d5c3a'); g.fillStyle='#f7e6a1'; g.font='bold 5px monospace'; g.fillText('PIZZA',X+2,Y-4);
    } else if (sp==='B'){
      P(g,X-2,Y-2,PXU+4,7,'#1d5c3a');
      for(let i=0;i<4;i++) P(g,X-2+i*5,Y-2,3,7,'#e8e4d4');
      P(g,X-2,Y+5,PXU+4,1,'#123c25');
      P(g,X+3,Y+7,10,13,'#233240'); P(g,X+4,Y+9,8,10,'#9fd8f0');
      g.fillStyle='#f7e6a1'; g.font='bold 5px monospace'; g.fillText('DELI',X+3,Y-4);
    } else if (sp==='S'){
      P(g,X+2,Y,12,20,'#1f1c26'); P(g,X+3,Y+4,10,16,'#0d0b12');
      for(let i=0;i<4;i++) P(g,X+3,Y+4+i*4,10,1,'#26222f');
      P(g,X,Y-7,16,6,'#111');
      g.fillStyle='#fff'; g.font='bold 5px monospace'; g.fillText('50 St',X+1,Y-2);
      g.fillStyle='#2850ad'; g.beginPath(); g.arc(X+5,Y+2,2.4,0,7); g.fill();
      g.beginPath(); g.arc(X+11,Y+2,2.4,0,7); g.fill();
    } else {
      // plain storefront window + roll gate variety
      if ((tx*7)%3===0){ P(g,X+2,Y+2,12,16,'#6a6360'); for(let i=0;i<8;i++) P(g,X+2,Y+2+i*2,12,1,'#7a7370'); }
      else { P(g,X+2,Y+3,12,14,'#2e3d55'); P(g,X+3,Y+4,4,5,'#8fb0d8'); }
    }
    // fire escape occasionally
    if (!sp && (tx*11)%4===1){ g.strokeStyle='#33302e'; g.strokeRect(X+1.5, 8.5, 13, H-34); }
  }
  return tex(c);
}

/* ---------- FOREGROUND X-RAY ----------
   Buildings between the camera and the player fade out inside a large,
   feathered circle that tracks the player's position on screen.
   Per-fragment: a building pixel fades only if
     (a) it's closer to the camera than the player (i.e. foreground), and
     (b) it falls inside the screen-space circle around the player.  */
const xray = {
  uniforms: {
    uPlayerScreen: { value: new THREE.Vector2() }, // player centre, device px
    uPlayerDepth:  { value: 10 },                  // player view-space depth
    uRadius:  { value: 200 },                      // fully-clear radius, px
    uFeather: { value: 120 },                      // feather width, px
    uGhost:   { value: 0.14 }                      // opacity left inside circle
  }
};
function xrayMat(mat){
  mat.transparent = true;
  mat.onBeforeCompile = shader => {
    Object.assign(shader.uniforms, xray.uniforms);
    shader.vertexShader = 'varying float vViewZ;\n' + shader.vertexShader.replace(
      '#include <project_vertex>',
      '#include <project_vertex>\n\tvViewZ = -mvPosition.z;'
    );
    shader.fragmentShader =
      'varying float vViewZ;\n' +
      'uniform vec2 uPlayerScreen;\n' +
      'uniform float uPlayerDepth;\n' +
      'uniform float uRadius;\n' +
      'uniform float uFeather;\n' +
      'uniform float uGhost;\n' +
      shader.fragmentShader.replace(
        '#include <dithering_fragment>',
        '\tfloat xrDist = distance(gl_FragCoord.xy, uPlayerScreen);\n' +
        '\tfloat xrHole = 1.0 - smoothstep(uRadius, uRadius + uFeather, xrDist);\n' +
        '\tfloat xrFront = step(vViewZ, uPlayerDepth - 0.25);\n' +
        '\tgl_FragColor.a *= mix(1.0, uGhost, xrHole * xrFront);\n' +
        '\t#include <dithering_fragment>'
      );
  };
  return mat;
}
const _xv = new THREE.Vector3();
function updateXray(){
  camera.updateMatrixWorld();
  camera.matrixWorldInverse.copy(camera.matrixWorld).invert();
  _xv.set(player.x, 0.7, player.z); // player's chest height
  const view = _xv.clone().applyMatrix4(camera.matrixWorldInverse);
  xray.uniforms.uPlayerDepth.value = -view.z;
  _xv.project(camera);
  const bw = renderer.domElement.width, bh = renderer.domElement.height;
  xray.uniforms.uPlayerScreen.value.set((_xv.x*0.5+0.5)*bw, (_xv.y*0.5+0.5)*bh);
  xray.uniforms.uRadius.value  = bh * 0.24;
  xray.uniforms.uFeather.value = bh * 0.16;
}

// Find horizontal runs of building tiles per band and split into individual buildings
(function buildBuildings(){
  const bands = [[0,2],[9,10],[16,17],[23,24],[30,31]];
  let bIdx = 0;
  for (const [z0,z1] of bands){
    const frontRow = z1; // southernmost row carries the facade specials
    let x = 0;
    while (x < MAPW){
      if (!BUILDING.has(map[frontRow][x])) { x++; continue; }
      let x1 = x;
      while (x1+1 < MAPW && BUILDING.has(map[frontRow][x1+1])) x1++;
      // split the run into buildings of 3-6 tiles, breaking at special storefronts
      let s = x;
      while (s <= x1){
        let e = Math.min(s + 3 + (bIdx*2)%3, x1);
        addBuilding(s, e, z0, z1, frontRow, bIdx++);
        s = e + 1;
      }
      x = x1 + 1;
    }
  }
  function addBuilding(x0, x1, z0, z1, frontRow, i){
    const w = x1-x0+1, d = z1-z0+1;
    const h = 2.0 + ((i*37)%5)*0.45;             // varied skyline
    const pal = PALETTES[i % PALETTES.length];
    const specials = [];
    for (let tx=x0; tx<=x1; tx++){
      const ch = map[frontRow][tx];
      specials.push(['D','P','B','S'].includes(ch) ? ch : null);
    }
    const front = xrayMat(new THREE.MeshLambertMaterial({ map: facadeTexture(w, h, specials, pal) }));
    const side  = xrayMat(new THREE.MeshLambertMaterial({ map: wallTexture(h, pal, d) }));
    const roof  = xrayMat(new THREE.MeshLambertMaterial({ map: roofTexture(w, d) }));
    const back  = xrayMat(new THREE.MeshLambertMaterial({ color: pal.dark }));
    const mats = [side, side, roof, back, front, back]; // +x,-x,+y,-y,+z,-z
    const box = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mats);
    box.position.set(x0 + w/2, h/2, z0 + d/2);
    box.castShadow = true; box.receiveShadow = true;
    scene.add(box);
  }
})();

function tiltedSprite(texture, w, h){
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(w, h),
    new THREE.MeshBasicMaterial({ map: texture, transparent: true, alphaTest: 0.5 })
  );
  m.rotation.x = -TILT;               // fixed 45° tilt in world space — never updated
  const g = new THREE.Group();
  // anchor bottom edge of the tilted plane at the group origin (the tile centre)
  m.position.set(0, (h/2)*Math.cos(TILT) + 0.01, -(h/2)*Math.sin(TILT));
  g.add(m);
  return g;
}

  const m = new THREE.Mesh(new THREE.PlaneGeometry(r*2, r*2),
    new THREE.MeshBasicMaterial({ map: tex(c), transparent: true, depthWrite: false }));
  m.rotation.x = -Math.PI/2; m.position.y = 0.005;
  parent.add(m);
}

    pos[i*3]   = moteBase[i*3]   = 1 + Math.random() * (MAPW - 2);
    pos[i*3+1] = moteBase[i*3+1] = 0.25 + Math.random() * 2.2;
    pos[i*3+2] = moteBase[i*3+2] = 26.3 + Math.random() * 5.4;
  }
  moteGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
}
const moteMat = new THREE.PointsMaterial({ color:'#d4b4ff', size:0.09, transparent:true, opacity:0, depthWrite:false });
scene.add(new THREE.Points(moteGeo, moteMat));

// guiding chevrons on the path through GGB's gap
function chevronTexture(){
  const c = makeCanvas(32, 32), g = c.getContext('2d');
  g.strokeStyle = '#ffd977'; g.lineWidth = 4; g.lineCap = 'round';
  g.shadowColor = '#ffd977'; g.shadowBlur = 5;
  g.beginPath(); g.moveTo(7, 8);  g.lineTo(16, 17); g.lineTo(25, 8);  g.stroke();
  g.beginPath(); g.moveTo(7, 17); g.lineTo(16, 26); g.lineTo(25, 17); g.stroke();
  return tex(c);
}
const arrowMeshes = [];
{
  const at = chevronTexture();
  [[8,25],[8,26],[8,27],[8,28],[8,29]].forEach(([ax, az], i) => {
    const m = new THREE.Mesh(
      new THREE.PlaneGeometry(0.62, 0.62),
      new THREE.MeshBasicMaterial({ map: at, transparent: true, opacity: 0, depthWrite: false })
    );
    m.rotation.x = -Math.PI/2;
    m.position.set(ax + 0.5, 0.02 + i * 0.001, az + 0.5);
    arrowMeshes.push(m);
    scene.add(m);
  });
}

function updateMystic(dt, now){
  const raw = (player.z - 26.5) / 3;
  const c = Math.min(1, Math.max(0, raw));
  const target = c * c * (3 - 2 * c); // smoothstep
  mystic.value += (target - mystic.value) * Math.min(1, dt * 3);
  const m = mystic.value;
  scene.fog.color.copy(ENV_BASE.fog).lerp(ENV_MYST.fog, m);
  scene.background.copy(ENV_BASE.bg).lerp(ENV_MYST.bg, m);
  scene.fog.near = 18 - 9 * m;
  scene.fog.far  = 34 - 10 * m;
  ambient.color.copy(ENV_BASE.amb).lerp(ENV_MYST.amb, m);
  ambient.intensity = 0.85 - 0.1 * m;
  sun.color.copy(ENV_BASE.sun).lerp(ENV_MYST.sun, m);
  sun.intensity = 0.75 - 0.2 * m;
  zoneTint.material.opacity = 0.3 * m;
  moteMat.opacity = 0.85 * m;
  if (m > 0.02){
    const pos = moteGeo.attributes.position.array, t = now / 1000;
    for (let i = 0; i < MOTES; i++){
      pos[i*3+1] = moteBase[i*3+1] + Math.sin(t * 0.8 + i * 1.7) * 0.16;
      pos[i*3]   = moteBase[i*3]   + Math.sin(t * 0.5 + i * 2.3) * 0.1;
    }
    moteGeo.attributes.position.needsUpdate = true;
  }
  // arrows appear once the prophecy is complete, pulsing gently
  const show = gotParts.every(Boolean) && !endingSeen ? 1 : 0;
  const t2 = now / 1000;
  arrowMeshes.forEach((a, i) => {
    a.material.opacity = show * (0.32 + 0.24 * Math.sin(t2 * 2.4 - i * 0.9));
  });
}

document.getElementById('endJosiah').src = 'data:image/png;base64,' + JOSIAH_B64;
document.getElementById('endVelli').src = 'data:image/png;base64,' + PORTRAIT_B64.velli;
let endingActive = false, endingSeen = false, endingStep = 0;

function startEnding(){
  endingSeen = true;
  endingActive = true;
  endingStep = 0;
  document.getElementById('endText').textContent =
    'you united the head, neck, chin, and lips. now i can rest in peace.';
  endingEl.classList.add('on');
}
function endingAdvance(){
  if (!endingActive) return;
  if (endingStep === 0){
    endingStep = 1;
    endingEl.classList.add('heaven');       // velli rises to meet josiah
    setTimeout(() => {
      if (endingStep === 1){ endingStep = 2; endingEl.classList.add('win'); }
    }, 2700);
  } else if (endingStep === 1){
    endingStep = 2;                          // impatient? skip straight to it
    endingEl.classList.add('win');
  } else {
    endingActive = false;                    // roll credits: back to the title
    endingEl.classList.remove('on');
    setTimeout(() => {
      endingEl.classList.remove('heaven', 'win');
      showTitle('post');
    }, 1650);
  }
}
endingEl.addEventListener('pointerdown', e => { e.preventDefault(); endingAdvance(); });


/* ---------- PLAYER: 2D sprite on a fixed 45° plane (NOT billboarded) ---------- */
const SPR_W = 26, SPR_H = 44, SCALE = 4; // logical px, upscaled texture
const headImg = new Image();
headImg.src = "data:image/png;base64," + HEAD_B64;

function drawFrame(dir, phase){ // phase: 0 stand, 1/2 walk steps
  const c = makeCanvas(SPR_W*SCALE, SPR_H*SCALE), g = c.getContext('2d');
  g.imageSmoothingEnabled = false;
  g.scale(SCALE, SCALE);
  if (dir === 'left'){ g.translate(SPR_W, 0); g.scale(-1, 1); } // mirror right-facing art
  const bob = phase ? (phase===1 ? 0 : 1) : 0;
  const lOff = phase===1 ? -2 : phase===2 ? 2 : 0;
  const aOff = phase===1 ? 1 : phase===2 ? -1 : 0;
  const bx = 2, by = bob;
  const p = (x,y,w,h,col)=>{ g.fillStyle=col; g.fillRect(x,y,w,h); };
  // legs: shorts, skin, sneakers
  p(bx+4, by+30, 5, 7, '#1f2a38'); p(bx+13, by+30, 5, 7, '#1f2a38');
  p(bx+4+lOff, by+36, 5, 5, '#c8916b'); p(bx+13-lOff, by+36, 5, 5, '#c8916b');
  p(bx+3+lOff, by+40, 7, 3, '#eee'); p(bx+12-lOff, by+40, 7, 3, '#eee');
  // torso: white racing tank, red trim, medal
  p(bx+2, by+16, 18, 15, '#f2efe6');
  p(bx+2, by+16, 18, 2, '#c9372c');
  p(bx+2, by+16, 2, 15, '#c9372c'); p(bx+18, by+16, 2, 15, '#c9372c');
  p(bx+8, by+16, 2, 8, '#2850ad'); p(bx+12, by+16, 2, 8, '#c9372c');
  p(bx+9, by+23, 4, 4, '#f2b23a');
  // arms
  p(bx-1, by+17+aOff, 3, 10, '#c8916b'); p(bx+20, by+17-aOff, 3, 10, '#c8916b');
  // head
  if (dir === 'up'){
    p(bx-1, by-6, 24, 22, '#241a16');
    p(bx+1, by-8, 20, 6, '#2e211b');
    p(bx+2, by+12, 20, 6, '#241a16');
    p(bx+3, by-7, 16, 3, '#3a6bd8'); // sunglasses band from behind
  } else {
    g.drawImage(headImg, bx-2, by-8, 26, 30);
    if (dir === 'left' || dir === 'right'){
      g.fillStyle = '#241a16';
      g.fillRect(bx+18, by-4, 6, 22); // hair covers far side (pre-mirror = right-facing)
    }
  }
  return tex(c);
}

const frames = {}; // frames[dir][phase]
const player = {
  tx: 10, tz: 4, x: 10.5, z: 4.5,
  dir: 'down', moving: false, stepFlip: false, walkT: 0
};
const playerGroup = new THREE.Group();
const PLANE_H = 1.5, PLANE_W = PLANE_H * SPR_W / SPR_H;
let spriteMat, spriteMesh;

function initPlayer(){
  for (const d of ['down','up','left','right']) frames[d] = [0,1,2].map(ph => drawFrame(d, ph));
  spriteMat = new THREE.MeshBasicMaterial({ map: frames.down[0], transparent: true, alphaTest: 0.5 });
  spriteMesh = new THREE.Mesh(new THREE.PlaneGeometry(PLANE_W, PLANE_H), spriteMat);
  spriteMesh.rotation.x = -TILT;      // fixed 45° tilt — set once, never rotated to face camera
  spriteMesh.position.y = (PLANE_H/2) * Math.cos(TILT) + 0.02;
  spriteMesh.position.z = -(PLANE_H/2) * Math.sin(TILT); // feet anchored at tile centre, sprite leans back over it
  playerGroup.add(spriteMesh);
  addBlobShadow(playerGroup, 0.34);
  playerGroup.position.set(player.x, 0, player.z);
  scene.add(playerGroup);
}

/* ---------- INPUT ---------- */
const held = { up:false, down:false, left:false, right:false };
let aPressed = false;
const KEYMAP = { ArrowUp:'up', w:'up', ArrowDown:'down', s:'down', ArrowLeft:'left', a:'left', ArrowRight:'right', d:'right' };
addEventListener('keydown', e => {
  if (titleActive){ titleDismiss(); e.preventDefault(); return; }
  if (introActive){
    if (e.key === ' ' || e.key === 'Enter' || e.key === 'z' || e.key in KEYMAP){ introNext(); e.preventDefault(); }
    return;
  }
  if (endingActive){
    if (e.key === ' ' || e.key === 'Enter' || e.key === 'z' || e.key in KEYMAP){ endingAdvance(); e.preventDefault(); }
    return;
  }
  if (ghostActive){
    if (e.key === ' ' || e.key === 'Enter' || e.key === 'z' || e.key in KEYMAP){ ghostAdvance(); e.preventDefault(); }
    return;
  }
  if (battleActive){
    if (e.key in KEYMAP){ battleDir(KEYMAP[e.key]); e.preventDefault(); }
    if (e.key === ' ' || e.key === 'Enter' || e.key === 'z'){ battleAction(); e.preventDefault(); }
    return;
  }
  if (e.key in KEYMAP){ held[KEYMAP[e.key]] = true; e.preventDefault(); }
  if (e.key === ' ' || e.key === 'Enter' || e.key === 'z'){ aPressed = true; e.preventDefault(); }
});
addEventListener('keyup', e => { if (e.key in KEYMAP) held[KEYMAP[e.key]] = false; });
document.querySelectorAll('.dbtn[data-d]').forEach(b => {
  const d = b.dataset.d;
  const on  = e => { e.preventDefault(); if (battleActive){ battleDir(d); return; } held[d] = true; };
  const off = e => { e.preventDefault(); held[d] = false; };
  b.addEventListener('pointerdown', on);
  b.addEventListener('pointerup', off);
  b.addEventListener('pointerleave', off);
  b.addEventListener('pointercancel', off);
});
document.getElementById('abtn').addEventListener('pointerdown', e => {
  e.preventDefault();
  if (battleActive){ battleAction(); return; }
  aPressed = true;
});

/* ---------- DIALOG ---------- */
const dlgEl = document.getElementById('dialog'), dtext = document.getElementById('dtext');
let dialogOpen = false;
function openDialog(text){ dtext.innerText = text; dlgEl.style.display = 'block'; dialogOpen = true; }
function closeDialog(){ dlgEl.style.display = 'none'; dialogOpen = false; }
function tryInteract(){
  const dx = { up:0, down:0, left:-1, right:1 }[player.dir];
  const dz = { up:-1, down:1, left:0, right:0 }[player.dir];
  const tr = trainerAt(player.tx + dx, player.tz + dz);
  if (tr){
    if (tr.defeated) openDialog(TRAINER_POST[tr.idx]);
    else { openDialog(TRAINER_PRE[tr.idx]); pendingBattle = tr.idx; }
    return;
  }
  const ch = (map[player.tz+dz] || [])[player.tx+dx];
  if (INTERACT[ch]) openDialog(INTERACT[ch]);
}

/* ---------- MOVEMENT ---------- */
const SPEED = 3.2; // units/sec
function passable(x, z){
  if (x < 0 || z < 0 || x >= MAPW || z >= MAPH) return false;
  if (trainerAt(x, z)) return false;
  return !SOLID.has(map[z][x]);
}
function update(dt){
  if (endingActive) return;
  if (!endingSeen && player.tz >= 29 && gotParts.every(Boolean)){
    startEnding();
    return;
  }
  if (aPressed){
    aPressed = false;
    if (dialogOpen){
      closeDialog();
      if (pendingBattle !== null){
        const i = pendingBattle; pendingBattle = null;
        showGhost(i);
        return;
      }
    }
    else if (!player.moving) tryInteract();
  }
  if (dialogOpen) return;

  if (player.moving){
    const gx = player.tx + 0.5, gz = player.tz + 0.5;
    const step = SPEED * dt;
    player.x += Math.max(-step, Math.min(step, gx - player.x));
    player.z += Math.max(-step, Math.min(step, gz - player.z));
    player.walkT += dt;
    if (Math.abs(player.x-gx) < 1e-4 && Math.abs(player.z-gz) < 1e-4){
      player.x = gx; player.z = gz; player.moving = false;
    }
  }
  if (!player.moving){
    const d = held.up ? 'up' : held.down ? 'down' : held.left ? 'left' : held.right ? 'right' : null;
    if (d){
      player.dir = d;
      const nx = player.tx + (d==='left'?-1:d==='right'?1:0);
      const nz = player.tz + (d==='up'?-1:d==='down'?1:0);
      const tr = trainerAt(nx, nz);
      if (tr && !tr.defeated){
        openDialog(TRAINER_PRE[tr.idx]);
        pendingBattle = tr.idx;
      } else if (passable(nx, nz)){
        player.tx = nx; player.tz = nz; player.moving = true; player.stepFlip = !player.stepFlip;
      }
    } else player.walkT = 0;
  }
  // sprite frame
  let phase = 0;
  if (player.moving) phase = (Math.floor(player.walkT*8)%2===0) ? (player.stepFlip?1:2) : 0;
  const f = frames[player.dir][phase];
  if (spriteMat.map !== f){ spriteMat.map = f; spriteMat.needsUpdate = true; }
  playerGroup.position.set(player.x, 0, player.z);
}

/* ---------- CAMERA FOLLOW (rigid offset, 45° down; perspective does the rest) ---------- */
const camTarget = new THREE.Vector3(player.x, 0.6, player.z);
function updateCamera(dt){
  const desired = new THREE.Vector3(player.x, 0.6, player.z);
  camTarget.lerp(desired, Math.min(1, dt*6));
  camera.position.copy(camTarget).add(camOffset);
  camera.lookAt(camTarget);
}

const B = {}; // battle state
function startBattle(idx){
  if (battleActive || dialogOpen) return;
  const e = ENEMIES[idx];
  Object.assign(B, {
    enemy: e, trainerIdx: idx, won: false, anim: null,
    phase:'msg', t:0,
    cursor:0,
    playerHP:50, playerMax:50, playerShownHP:50,
    enemyHP:e.hp, enemyMax:e.hp, enemyShownHP:e.hp,
    pAtk:0, pDef:0, pSpd:0, eAtk:0, eDef:0, eSpd:0,
    bac:0, unread:false, lastE:-1, away:false,
    playerFlash:0, enemyFlash:0, playerLunge:0, enemyLunge:0,
    queue:[{ text: e.name + ' wants to battle!', fn:null },
           { text: e.intro, fn:null }],
    after:'menu', over:false
  });
  battleActive = true;
  battleWrap.style.display = 'flex';
  advanceQueue(); // show the intro line immediately
}
function endBattle(){
  battleActive = false;
  battleWrap.style.display = 'none';
  if (B.won && B.trainerIdx !== undefined && !trainers[B.trainerIdx].defeated){
    defeatTrainer(B.trainerIdx);
  }
}

    { name:'CS2 POP OFF',     dmg:[8,12], bac:10, flavor:'"ONE TAP."' },
    { name:'HAIR OF THE DOG', bac:10, flavor:'Hair of the dog.\nClassic.' }
  ],
  julian: [
    { name:'NON ENGLISH SLUR', dmg:[8,12], you:{def:-1},
      flavor:"You don't know what it means.\nIt still hurts." },
    { name:'AMBERLAMPS', heal:1/3, flavor:'"WEE WOO WEE WOO."' },
    { name:'DO NO HARM', you:{def:-1}, self:{atk:1},
      flavor:'JULIAN recites the oath,\nironically.' },
    { name:'"LISA"', dmg:[16,22], flavor:'"LISAAAAA!"' }
  ],
  fleece: [
    { name:"IT'S LOOSE",   self:{atk:1}, flavor:'"It\'s loose."' },
    { name:"THAT'S THE THING MAN,\nYOU CAN'T", block:true },

    { name:'NEW LORE',      dmg:[7,10], self:{spd:1}, flavor:"He's still talking." }
  ]
};

/* ---------- turn logic ---------- */
const rnd = (a,b) => a + Math.floor(Math.random() * (b - a + 1));
function inject1(text, fn){ B.queue.unshift({ text, fn }); }
function injectSeq(list){ for (let k = list.length-1; k >= 0; k--) B.queue.unshift(list[k]); }
function usedLine(who, name){ return who + ' used ' + name + '!'; }

// stat stages: each stage is worth 3 damage points, clamped to [-4, +4]
const STAGE_KEYS = { p:{atk:'pAtk',def:'pDef',spd:'pSpd'}, e:{atk:'eAtk',def:'eDef',spd:'eSpd'} };
function applyStage(side, key, delta){
  const k = STAGE_KEYS[side][key];
  const who = side === 'p' ? 'Your' : B.enemy.name + "'s";
  const statName = { atk:'attack', def:'defense', spd:'speed' }[key];
  const nv = Math.max(-4, Math.min(4, B[k] + delta));
  if (nv === B[k]) return who + ' ' + statName + "\ncan't go " + (delta > 0 ? 'higher!' : 'lower!');
  B[k] = nv;
  return who + ' ' + statName + (delta > 0 ? ' rose!' : ' fell!');
}
function playerDmg(min, max){ return Math.max(1, rnd(min, max) + 3*(B.pAtk - B.eDef)); }
function enemyDmg(min, max){ return Math.max(1, rnd(min, max) + 3*(B.eAtk - B.pDef)); }

/* ---------- enemy AI ---------- */
function pickEnemyMove(){
  const k = B.enemy.key, M = ENEMY_MOVES[k];
  const hpr = B.enemyHP / B.enemyMax;
  let w;
  if (k === 'ggb')    w = [30, 20, B.unread ? 8 : 30, B.unread ? 42 : 12];
  if (k === 'chula')  w = B.bac > 30 ? [70, 10, 15, 5] : [0, 45, 35, 20];
  if (k === 'julian') w = [35, hpr < 0.55 ? 45 : 0, 25, hpr < 0.8 ? 22 : 10];
  if (k === 'fleece') w = [B.eAtk < 2 ? 30 : 8, B.lastE === 1 ? 0 : 25, 30, B.eSpd < 2 ? 25 : 10];
  let total = w.reduce((a,b) => a+b, 0), r = Math.random() * total, idx = 0;
  for (; idx < 4; idx++){ r -= w[idx]; if (r <= 0) break; }
  idx = Math.min(3, idx);
  B.lastE = idx;
  return M[idx];
}

/* ---------- move resolution (runs at message-display time, injects results) ---------- */
function queuePlayerMove(m){
  say(usedLine('HARRISON', m.name), () => { B.playerLunge = 1; });
  say(null, () => resolvePlayer(m));
}
function resolvePlayer(m){
  const seq = [], T = (text, fn) => seq.push({ text, fn });
  if (m.heal){
    T('HARRISON locks in.\nRecovered ' + m.heal + ' HP!', () => {
      B.playerHP = Math.min(B.playerMax, B.playerHP + m.heal);
    });
  } else if (m.clutch){
    T(null, () => {
      const desperation = 1 - B.playerHP / B.playerMax;
      const base = 4 + Math.round(18 * desperation);
      const d = Math.max(1, rnd(base, base + 4) + 3*(B.pAtk - B.eDef));
      if (desperation > 0.6) inject1("Backs against the wall.\nThis is HARRISON time.");
      inject1('It hits for ' + d + ' damage!', () => {
        B.enemyFlash = 1; B.enemyHP = Math.max(0, B.enemyHP - d);
      });
    });
  } else if (Math.random() > m.acc){
    T('The attack missed!');
  } else {
    T(null, () => {
      const d = playerDmg(m.min, m.max);
      inject1('It hits for ' + d + ' damage!', () => {
        B.enemyFlash = 1; B.enemyHP = Math.max(0, B.enemyHP - d);
      });
    });
  }
  injectSeq(seq);
}
function queueJellybeansDeparture(){
  say(usedLine('HARRISON', 'SORT JELLYBEANS'), () => { B.playerLunge = 1; });
  say('HARRISON leaves to sort\nthe jellybeans.', () => { B.away = true; });
}
function buildReturnTurn(){
  B.away = false;
  const em = pickEnemyMove();
  say('HARRISON returns.\nThe jellybeans are sorted.');
  say(null, () => inject1(applyStage('p', 'atk', 1)));
  say(null, () => inject1(applyStage('p', 'spd', 1)));
  if (em.block){
    say(usedLine(B.enemy.name, em.name), () => { B.enemyLunge = 1; });
    say('FLEECE holds up a hand.\n"That\'s the thing man, you can\'t."');
    say('The return strike was blocked!');
    B.queue.push(playerFaintCheck());
  } else {
    say(null, () => {
      const d = playerDmg(6, 10);
      inject1('Return strike!\nIt hits for ' + d + ' damage!', () => {
        B.enemyFlash = 1; B.enemyHP = Math.max(0, B.enemyHP - d);
      });
    });
    B.queue.push(enemyFaintCheck());
    queueEnemyMove(em);
    B.queue.push(playerFaintCheck());
  }
}
function queueEnemyMove(em){
  say(usedLine(B.enemy.name, em.name), () => { B.enemyLunge = 1; });
  say(null, () => resolveEnemy(em));
}
function resolveEnemy(em){
  const seq = [], T = (text, fn) => seq.push({ text, fn });
  if (em.flavor) T(em.flavor);
  if (em.bac){
    B.bac += em.bac;
    T('CHULA takes a swig!');
    T('BAC is now .' + String(B.bac).padStart(2, '0') + '.');
  }
  if (em.dmg){
    if (B.away){
      T("...but HARRISON isn't here.\nThe jellybeans need him.");
    } else if (em.acc && Math.random() > em.acc){
      T('The attack missed!\n(BAC-related, probably.)');
    } else {
      T(null, () => {
        const d = enemyDmg(em.dmg[0], em.dmg[1]);
        inject1('You take ' + d + ' damage!', () => {
          B.playerFlash = 1; B.playerHP = Math.max(0, B.playerHP - d);
          if (em.anim) B.anim = { type: em.anim, t: 0, impacted: false };
        });
      });
    }
  }
  if (em.status === 'unread'){
    if (!B.unread){
      B.unread = true;
      T(B.away ? 'The email finds HARRISON anyway.\nUNREAD MESSAGE!' : 'You now have an\nUNREAD MESSAGE!');
    }
    else T('It joins the pile of\nunread messages.');
  }
  if (em.cond === 'unread' && B.unread && !B.away){
    T('The banker chews you out for\nnot being on top of your inbox!');
    T(null, () => inject1(applyStage('p', 'def', -1)));
  }
  if (em.heal){
    T(null, () => {
      const h = Math.ceil(B.enemyMax * em.heal);
      inject1(B.enemy.name + ' recovered ' + h + ' HP!', () => {
        B.enemyHP = Math.min(B.enemyMax, B.enemyHP + h);
      });
    });
  }
  if (em.self) for (const key of Object.keys(em.self)){
    const d = em.self[key];
    T(null, () => inject1(applyStage('e', key, d)));
  }
  if (em.you && !B.away) for (const key of Object.keys(em.you)){
    const d = em.you[key];
    T(null, () => inject1(applyStage('p', key, d)));
  }
  injectSeq(seq);
}
function enemyFaintCheck(){
  return { text:null, fn: () => {
    if (B.enemyHP <= 0){
      B.queue.length = 0;
      say(B.enemy.name + ' was defeated!');
      say('HARRISON gained ' + (B.enemy.lv * 8) + ' EXP.\n(There is no EXP system.)');
      B.over = true; B.won = true;
    }
  }};
}
function playerFaintCheck(){
  return { text:null, fn: () => {
    if (B.playerHP <= 0){
      B.queue.length = 0;
      say('HARRISON blacked out!');
      say('He wakes up outside the pizza place,\nsomehow fine.');
      B.over = true;
      B.playerHP = B.playerMax; // restored on exit
    }
  }};
}

function useMove(i){
  const m = MOVES[i];
  const em = pickEnemyMove();
  const playerAttacking = !m.heal && !m.debuff && !m.jellybeans;
  B.phase = 'msg';
  if (m.jellybeans){
    if (em.block){
      say(usedLine(B.enemy.name, em.name), () => { B.enemyLunge = 1; });
      say("...but you weren't attacking.");
      queueJellybeansDeparture(); // block wasted; departure proceeds
    } else if (B.eSpd > B.pSpd){
      // foe is faster: their hit lands before you slip away
      queueEnemyMove(em);
      B.queue.push(playerFaintCheck());
      queueJellybeansDeparture();
    } else {
      queueJellybeansDeparture();
      queueEnemyMove(em); // damage whiffs vs. the away state
    }
    // the return turn auto-triggers from advanceQueue
  } else if (em.block){
    // priority 1: the block resolves before anything you do
    say(usedLine(B.enemy.name, em.name), () => { B.enemyLunge = 1; });
    if (playerAttacking){
      say(usedLine('HARRISON', m.name), () => { B.playerLunge = 1; });
      say('FLEECE holds up a hand.\n"That\'s the thing man, you can\'t."');
      say('Your attack was blocked!');
    } else {
      say("...but you weren't attacking.");
      queuePlayerMove(m);
      B.queue.push(enemyFaintCheck());
    }
  } else if (B.eSpd > B.pSpd){
    // the foe outspeeds you
    queueEnemyMove(em);
    B.queue.push(playerFaintCheck());
    queuePlayerMove(m);
    B.queue.push(enemyFaintCheck());
  } else {
    queuePlayerMove(m);
    B.queue.push(enemyFaintCheck());
    queueEnemyMove(em);
    B.queue.push(playerFaintCheck());
  }
  B.after = 'menu';
  advanceQueue();
}
function tryRun(){
  B.phase = 'msg';
  B.queue.length = 0;
  say('Got away safely!');
  B.over = true;
  advanceQueue();
}
function advanceQueue(){
  // pop next entry; entries with null text run their fn silently and continue
  while (B.queue.length){
    const q = B.queue.shift();
    if (q.fn) q.fn();
    if (q.text){ B.msg = q.text; return; }
  }
  B.msg = null;
  if (B.over){ endBattle(); return; }
  if (B.away){ buildReturnTurn(); advanceQueue(); return; } // forced second turn of SORT JELLYBEANS
  B.phase = B.after;
}

/* ---------- battle input ---------- */
function battleDir(d){
  if (B.phase !== 'menu') return;
  // grid: 0 1 / 2 3, RUN = 4 (right column)
  const c = B.cursor;
  if (d === 'left')  B.cursor = c===4 ? 1 : (c%2===1 ? c-1 : c);
  if (d === 'right') B.cursor = c%2===1 ? 4 : (c===4 ? 4 : c+1);
  if (d === 'up')    B.cursor = c===4 ? 4 : (c>=2 ? c-2 : c);
  if (d === 'down')  B.cursor = c===4 ? 4 : (c<2 ? c+2 : c);
}
function battleAction(){
  if (B.phase === 'msg'){ advanceQueue(); return; }
  if (B.phase === 'menu'){
    if (B.cursor === 4) tryRun();
    else useMove(B.cursor);
  }
}
// tap support: menu buttons + advancing messages
bcvs.addEventListener('pointerdown', e => {
  e.preventDefault();
  const r = bcvs.getBoundingClientRect();
  const x = (e.clientX - r.left) / r.width * 256;
  const y = (e.clientY - r.top) / r.height * 192;
  if (B.phase === 'msg'){ advanceQueue(); return; }
  if (B.phase === 'menu'){
    for (let i=0;i<5;i++){
      const [rx,ry,rw,rh] = menuRect(i);
      if (x>=rx && x<=rx+rw && y>=ry && y<=ry+rh){
        if (B.cursor === i) battleAction(); else B.cursor = i;
        return;
      }
    }
  }
});

/* ---------- battle drawing ---------- */
function menuRect(i){
  if (i === 4) return [196, 136, 52, 48];        // RUN
  const col = i % 2, row = (i / 2) | 0;
  return [8 + col*92, 136 + row*24, 88, 20];     // moves 2x2
}
function bp(x,y,w,h,c){ bg2.fillStyle = c; bg2.fillRect(x|0,y|0,w,h); }
function btext(t,x,y,c,size){
  bg2.fillStyle = c || '#2a2438';
  bg2.font = 'bold ' + (size||8) + 'px monospace';
  bg2.fillText(t, x, y);
}
function hpBar(x, y, w, shown, max){
  const r = shown / max;
  bp(x-1, y-1, w+2, 6, '#2a2438');
  bp(x, y, w, 4, '#9aa0a6');
  bp(x, y, Math.max(0, Math.round(w*r)), 4, r > .5 ? '#3fae5a' : r > .2 ? '#e0a02e' : '#d0402e');
}

function drawPlayerBack(x, y, s, lunge){
  // messy brown hair from behind (faithful to the reference drawing), tank top shoulders
  const o = Math.round(lunge * 10);
  const X = x + o, Y = y;
  // shoulders + tank
  bp(X-2, Y+34, 52, 18, '#f2efe6');
  bp(X-2, Y+34, 52, 3, '#c9372c');
  bp(X-2, Y+34, 3, 18, '#c9372c'); bp(X+47, Y+34, 3, 18, '#c9372c');
  bp(X-8, Y+38, 7, 14, '#c8916b'); bp(X+49, Y+38, 7, 14, '#c8916b'); // arms
  // neck
  bp(X+18, Y+30, 12, 6, '#c8916b');
  // hair mass
  bp(X+4, Y+2, 40, 32, '#3a2a1c');
  bp(X+8, Y-2, 32, 10, '#4a3524');
  bp(X+2, Y+10, 44, 18, '#3a2a1c');
  // messy strands (deterministic scruff)
  const strands = [[0,14,6,3],[42,10,8,3],[44,20,7,3],[-3,22,7,3],[6,32,8,3],[34,33,9,3],[12,-4,6,3],[28,-5,7,3],[40,2,6,3],[-1,6,5,3]];
  for (const [sx,sy,sw,sh] of strands) bp(X+sx, Y+sy, sw, sh, '#4a3524');
  for (const [sx,sy] of [[10,6],[24,12],[34,8],[16,20],[30,22],[8,26]]) bp(X+sx, Y+sy, 10, 2, '#2c1f14');
  // sunglasses band peeking over the top
  bp(X+10, Y-1, 28, 3, '#3a6bd8');
}

function drawEnemy(t, flash, lunge){
  const e = B.enemy;
  const bob = Math.round(Math.sin(t*2.2) * 2);
  const o = Math.round(lunge * -12);
  if (flash > 0 && Math.floor(t*20) % 2 === 0) return; // hit blink
  const scale = 1.3;
  const w = Math.round(e.img.width * scale), h = Math.round(e.img.height * scale);
  const x = 190 - w/2 + o;
  const y = 74 - h + bob; // feet planted on the platform
  bg2.drawImage(e.img, x|0, y|0, w, h);
}

function drawDiesel(a){
  const img = B.enemy.img, s = 1.3;
  const w = Math.round(img.width*s), h = Math.round(img.height*s);
  const bx = 190 - w/2, by = 74 - h;       // platform position
  const tx = 44, ty = 62;                  // impact position (on HARRISON)
  const t = a.t;
  let px, py;
  if (t < 0.15){                           // wind-up rattle
    px = bx + Math.round(Math.sin(t*90)*2); py = by - Math.round(6*(t/0.15));
  } else if (t < 0.5){                     // LAUNCH (ease-in)
    const u = (t-0.15)/0.35, e = u*u;
    px = bx + (tx-bx)*e; py = by + (ty-by)*e;
  } else if (t < 0.7){                     // grinding on impact
    px = tx + Math.round(Math.sin(B.t*70)*2); py = ty;
  } else {                                 // drift back to the platform
    const u = Math.min(1, (t-0.7)/0.45), e = 1 - (1-u)*(1-u);
    px = tx + (bx-tx)*e; py = ty + (by-ty)*e;
  }
  // flame trail streaming back toward the platform
  if (t > 0.15 && t < 0.75){
    const vx = bx - px, vy = by - py, L = Math.hypot(vx, vy) || 1;
    const cols = ['#fff3a0','#f7b32b','#e07020','#c9372c'];
    for (let i = 1; i <= 6; i++){
      bg2.globalAlpha = Math.max(0, 0.85 - i*0.13);
      bg2.fillStyle = cols[i % 4];
      bg2.beginPath();
      bg2.arc(px + w/2 + vx/L*i*9 + (Math.random()*4-2),
              py + h/2 + vy/L*i*9 + (Math.random()*4-2),
              7 - i*0.8, 0, Math.PI*2);
      bg2.fill();
    }
    bg2.globalAlpha = 1;
  }
  bg2.drawImage(img, px|0, py|0, w, h);
}

function drawBattle(dt, t){
  B.t = (B.t || 0) + dt;
  // decay animation timers
  for (const k of ['playerFlash','enemyFlash','playerLunge','enemyLunge'])
    B[k] = Math.max(0, B[k] - dt*2.5);
  // HP bars animate toward true value
  B.playerShownHP += (B.playerHP - B.playerShownHP) * Math.min(1, dt*6);
  B.enemyShownHP  += (B.enemyHP  - B.enemyShownHP)  * Math.min(1, dt*6);

  // diesel rocket animation clock
  let dz = null;
  if (B.anim && B.anim.type === 'diesel'){
    B.anim.t += dt;
    if (!B.anim.impacted && B.anim.t >= 0.5){ B.anim.impacted = true; B.playerFlash = 1; }
    if (B.anim.t >= 1.15) B.anim = null; else dz = B.anim;
  }
  let shakeX = 0, shakeY = 0;
  if (dz && dz.t > 0.5 && dz.t < 0.78){
    shakeX = Math.round(Math.sin(B.t*60)*3);
    shakeY = Math.round(Math.cos(B.t*47)*2);
  }
  bp(0, 0, 256, 192, '#0d0b12');
  bg2.save();
  bg2.translate(shakeX, shakeY);

  // backdrop
  bp(0, 0, 256, 192, '#f0ead8');
  bp(0, 0, 256, 60, '#e6dfc8');
  // enemy platform (oval, like the sketch)
  bg2.fillStyle = '#d8d2c0';
  bg2.strokeStyle = '#8a8478'; bg2.lineWidth = 2;
  bg2.beginPath(); bg2.ellipse(190, 70, 48, 13, 0, 0, Math.PI*2); bg2.fill(); bg2.stroke();
  if (dz) drawDiesel(dz);
  else drawEnemy(B.t, B.enemyFlash, B.enemyLunge);
  // ground line under player
  bp(0, 122, 150, 3, '#8a8478');
  const pShake = B.playerFlash > 0 ? Math.round(Math.sin(B.t*40)*2) : 0;
  drawPlayerBack(34 + pShake, 68, 1, B.playerLunge);

  // enemy info box (top-left)
  bp(6, 8, 108, 32, '#f8f4e8'); bg2.strokeStyle = '#2a2438'; bg2.lineWidth = 2; bg2.strokeRect(7, 9, 106, 30);
  btext(B.enemy.name + '  Lv.' + B.enemy.lv, 12, 18);
  hpBar(12, 22, 90, B.enemyShownHP, B.enemyMax);
  const eTags = [];
  if (B.eAtk) eTags.push('ATK' + (B.eAtk>0?'+':'') + B.eAtk);
  if (B.eDef) eTags.push('DEF' + (B.eDef>0?'+':'') + B.eDef);
  if (B.eSpd) eTags.push('SPD' + (B.eSpd>0?'+':'') + B.eSpd);
  if (B.enemy.key === 'chula') eTags.push('BAC .' + String(B.bac).padStart(2,'0'));
  if (eTags.length) btext(eTags.join(' '), 12, 36, '#6b2f8a', 6);

  // player info box (right, above menu)
  bp(142, 96, 108, 32, '#f8f4e8'); bg2.strokeRect(143, 97, 106, 30);
  btext('HARRISON  Lv.7', 148, 107);
  hpBar(148, 112, 90, B.playerShownHP, B.playerMax);
  btext(Math.round(B.playerShownHP) + '/' + B.playerMax, 148, 125, '#2a2438', 7);
  const pTags = [];
  if (B.pAtk) pTags.push('ATK' + (B.pAtk>0?'+':'') + B.pAtk);
  if (B.pDef) pTags.push('DEF' + (B.pDef>0?'+':'') + B.pDef);
  if (B.pSpd) pTags.push('SPD' + (B.pSpd>0?'+':'') + B.pSpd);
  if (B.unread) pTags.push('MAIL!');
  if (pTags.length) btext(pTags.join(' '), 186, 125, '#6b2f8a', 6);

  // bottom panel
  bp(0, 130, 256, 62, '#2a2438');
  bp(2, 132, 252, 58, '#3a3350');

  if (B.phase === 'menu'){
    for (let i=0;i<5;i++){
      const [x,y,w,h] = menuRect(i);
      const sel = B.cursor === i;
      bp(x, y, w, h, sel ? '#f8f4e8' : '#d8d2c0');
      bg2.strokeStyle = sel ? '#c9372c' : '#2a2438'; bg2.lineWidth = 2;
      bg2.strokeRect(x+1, y+1, w-2, h-2);
      if (i === 4){
        btext('RUN', x+15, y+28, '#c9372c', 9);
      } else {
        btext(MOVES[i].name, x+5, y+13, '#2a2438', MOVES[i].name.length > 13 ? 6 : 7);
      }
      if (sel && i !== 4) btext(MOVES[i].desc, 8, 188, '#d8d2c0', 7);
      if (sel){ btext('▶', x-1, y+13, '#c9372c', 7); }
    }
  } else if (B.msg){
    bg2.fillStyle = '#f8f4e8'; bg2.font = 'bold 9px monospace';
    B.msg.split('\n').forEach((ln, i) => bg2.fillText(ln, 10, 150 + i*13));
    if (Math.floor(B.t*2) % 2) btext('▼', 240, 184, '#f8f4e8', 9);
  }
  bg2.restore();
  // white impact flash
  if (dz && dz.t >= 0.5 && dz.t < 0.64){
    bg2.globalAlpha = 0.75 * (1 - (dz.t - 0.5) / 0.14);
    bg2.fillStyle = '#fff';
    bg2.fillRect(0, 0, 256, 192);
    bg2.globalAlpha = 1;
  }
}

/* ---------- LOOP ---------- */
let last = performance.now();
function loop(now){
  const dt = Math.min(0.05, (now-last)/1000); last = now;
  if (battleActive){
    drawBattle(dt, now);
  } else {
    ensureTrainerSprites();
    update(dt);
    updateCamera(dt);
    updateMystic(dt, now);
    updateXray();
    renderer.render(scene, camera);
  }
  requestAnimationFrame(loop);
}
headImg.onload = () => { initPlayer(); requestAnimationFrame(loop); };
</script>
